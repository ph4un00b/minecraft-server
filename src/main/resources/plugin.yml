name: ColosseumArena
version: 1.0
main: com.colosseum.arena.ArenaPlugin
api-version: "1.21"
description: Auto-generates a gothic colosseum arena at world spawn
author: ArenaBuilder

commands:
  arena:
    description: Arena management and combat commands
    usage: /<command> [simple|detailed|rebuild|sety <level>|restock <player>]
    permission: colosseum.arena.admin
    permission-message: You do not have permission to use this command.

permissions:
  colosseum.arena.admin:
    description: Allows arena management
    default: op
